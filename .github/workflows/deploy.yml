name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ VERCEL_TOKEN secret not set."
            echo ""
            echo "To fix:"
            echo "1. Go to https://vercel.com/account/tokens"
            echo "2. Create a token named 'thisismycard-deploy'"  
            echo "3. Go to https://github.com/aqlhzm/thisismycard/settings/secrets/actions"
            echo "4. Add secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            echo ""
            echo "VERCEL_ORG_ID = team_AoCFtGEgIopukP2xQwzahUO5"
            echo "VERCEL_PROJECT_ID = (get after first vercel link)"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN found"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "✅ Deployed: $URL"
