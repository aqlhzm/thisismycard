name: Setup Vercel Project (Run Once)

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Your Vercel Personal Access Token'
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Create Vercel Project
        id: create_project
        run: |
          # Link/create project
          vercel link --yes --token "${{ github.event.inputs.vercel_token }}" \
            --scope izzifnexasolutions-blips-projects \
            --project thisismycard || true
          
          # Get project info
          PROJECT_ID=$(cat .vercel/project.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('projectId',''))")
          ORG_ID=$(cat .vercel/project.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('orgId',''))")
          
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "org_id=$ORG_ID" >> $GITHUB_OUTPUT
          echo "Project: $PROJECT_ID, Org: $ORG_ID"

      - name: Set Vercel Environment Variables
        run: |
          TOKEN="${{ github.event.inputs.vercel_token }}"
          echo "https://zqaxufcfappmlqldjryb.supabase.co" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --token "$TOKEN" --yes || true
          echo "https://zqaxufcfappmlqldjryb.supabase.co" | vercel env add NEXT_PUBLIC_SUPABASE_URL preview --token "$TOKEN" --yes || true
          echo "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxYXh1ZmNmYXBwbWxxbGRqcnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDAwODIsImV4cCI6MjA5Nzc3NjA4Mn0.9DIQgqr56nqzx32B6HDelWJUnCXBg7CFXLJqs5-8QZk" | vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --token "$TOKEN" --yes || true
          echo "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxYXh1ZmNmYXBwbWxxbGRqcnliIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjIwMDA4MiwiZXhwIjoyMDk3Nzc2MDgyfQ.w9GP0HuwnWe306HRhoztHXo0eukcl2qVjFCA6ADSxWI" | vercel env add SUPABASE_SERVICE_ROLE_KEY production --token "$TOKEN" --yes || true
          echo "admin@thisismycard.io" | vercel env add ADMIN_EMAIL production --token "$TOKEN" --yes || true
          echo "Admin@TIMC2024!" | vercel env add ADMIN_PASSWORD production --token "$TOKEN" --yes || true
          echo "✅ Environment variables set"

      - name: Deploy to Production
        run: |
          vercel build --prod --token "${{ github.event.inputs.vercel_token }}"
          vercel deploy --prebuilt --prod --token "${{ github.event.inputs.vercel_token }}"

      - name: Output Deploy URL
        run: |
          echo "🎉 Deployment complete!"
          echo "Visit: https://thisismycard.vercel.app"
